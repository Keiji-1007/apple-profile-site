<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI、ニュース、社会問題、テクノロジーを中心に、気になる話題をわかりやすく整理しています。"
    />
    <title>ニュースのとなり | Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="profile-card" aria-label="プロフィールカード">
        <header class="profile-header">
          <p class="kicker">NEWS & INSIGHTS</p>
          <img
            class="avatar"
            src="https://placehold.co/160x160/111111/ffffff?text=NT"
            alt="プロフィール画像"
          />
          <h1 class="name">ニュースのとなり</h1>
          <p class="bio">
            AI、ニュース、社会問題、テクノロジーを中心に、気になる話題をわかりやすく整理しています。
          </p>
        </header>

        <nav class="link-list" aria-label="外部リンク">
          <!-- noteリンク差し替え場所 -->
          <a class="link-item" href="https://note.com/good_clover2228" target="_blank" rel="noopener noreferrer">
            <span>📝 note</span>
            <span aria-hidden="true">↗</span>
          </a>
          <!-- Xリンク差し替え場所。自分のXプロフィールURLが分かったら href を変更 -->
          <a class="link-item" href="https://x.com/" target="_blank" rel="noopener noreferrer">
            <span>X</span>
            <span aria-hidden="true">↗</span>
          </a>
          <!-- YouTubeリンク差し替え場所。自分のYouTubeチャンネルURLが分かったら href を変更 -->
          <a class="link-item" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">
            <span>▶ YouTube</span>
            <span aria-hidden="true">↗</span>
          </a>
        </nav>

        <footer class="card-footer">
          <small id="last-updated"></small>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
